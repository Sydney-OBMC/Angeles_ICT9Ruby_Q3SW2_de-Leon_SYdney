<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Make-Up Product Locator</title>
    <style>

        body{
        font-family: Arial;
        background-color:#ffe6f2;
        text-align:center;
        }

        h1{
        color:#cc0066;
        }

        .container{
        width:80%;
        margin:auto;
        }

        input{
        padding:10px;
        width:200px;
        }

        button{
        padding:10px;
        background-color:#ff4da6;
        color:white;
        border:none;
        }

        .products{
        display:flex;
        justify-content:center;
        gap:20px;
        margin-top:30px;
        }

        .card{
        background:white;
        width:200px;
        padding:10px;
        border-radius:10px;
        box-shadow:0px 0px 10px gray;
        }

        .card img{
        width:100%;
        height:150px;
        object-fit:cover;
        border-radius:5px;
        }

        .recommended{
        border:4px solid hotpink;
        }

    </style>
</head>
<body>
    <h1>Make-Up Product Locator</h1>

    <p>Enter your budget:</p>

    <input type="number" id="budget" placeholder="Enter budget">
    <button onclick="findMakeup()">Search</button>

    <p id="result">Recommended product will appear here.</p>

    <div class="container">

    <div class="products">

    <div class="card" id="lipstick">
    <img src="lipstick.jpg">
    <h3>Lipstick</h3>
    <p>Budget Friendly</p>
    </div>

    <div class="card" id="foundation">
    <img src="foundation.jpg">
    <h3>Foundation</h3>
    <p>Mid Range</p>
    </div>

    <div class="card" id="palette">
    <img src="palette.jpg">
    <h3>Eyeshadow Palette</h3>
    <p>Premium</p>
    </div>

    </div>

    </div>

    <script>

    function findMakeup(){

    var money = document.getElementById("budget").value;

    var lipstick = document.getElementById("lipstick");
    var foundation = document.getElementById("foundation");
    var palette = document.getElementById("palette");

    var result = document.getElementById("result");

    lipstick.classList.remove("recommended");
    foundation.classList.remove("recommended");
    palette.classList.remove("recommended");

    if(money < 500){
    result.innerHTML="Recommended: Lipstick";
    lipstick.classList.add("recommended");
    }

    else if(money >=500 && money <1500){
    result.innerHTML="Recommended: Foundation";
    foundation.classList.add("recommended");
    }

    else{
    result.innerHTML="Recommended: Eyeshadow Palette";
    palette.classList.add("recommended");
    }

    }

    </script>    
</body>
</html>
